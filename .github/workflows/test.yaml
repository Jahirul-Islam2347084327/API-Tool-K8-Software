name: test

on:
    workflow_dispatch:
permissions:
    id-token: write
    contents: write
    #push:
        #branches: [main]
        #paths:
            #- Dockerfile
            #- main.py



env:
  AWS_REGION: us-east-1
  ECR_REPOSITORY: url-app

jobs:
  deploy:
    runs-on: ubuntu-latest
    
    steps:
      - name: Generate GitHub App Token
        id: generate-token
        uses: actions/create-github-app-token@v3
        with:
          client-id: ${{ secrets.CLIENT_ID }}
          private-key: ${{ secrets.APP_PRIVATE_KEY }}
      
      - name: Checkout Receiver Repo
        uses: actions/checkout@v4
        with:
          repository: Jahirul-Islam2347084327/API-Tool-K8-Infrastructure
          token: ${{ steps.generate-token.outputs.token }}
          

      - name: Update Kubernetes manifest
        env:
          ECR_REGISTRY: test
        run: |
          sed -i "s|image:.*|image: $ECR_REGISTRY/url-app:${{ github.sha }}|g" ./kubernetes/manifest/deployment.yaml
          
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          
          git add kubernetes/manifest/deployment.yaml
          git commit -m "Update image to ${{ github.sha }}"
          
          # Push using the tokenized remote
          git push origin HEAD:main
     